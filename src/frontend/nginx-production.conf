# Ionic Swap Nginx Configuration (comprehensive production setup)
server {
    server_name ionicswap.com www.ionicswap.com;

    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/json
        application/xml
        image/svg+xml;

    # SEO and Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    
    # Canonical URL header to prevent duplicate content
    add_header Link "<https://ionicswap.com$request_uri>; rel=\"canonical\"" always;
    
    # Robots meta tag to ensure proper indexing
    add_header X-Robots-Tag "index, follow" always;

    # Serve static files with gzip support
    location /_nuxt/ {
        alias /var/www/ionicswap.com/.output/public/_nuxt/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        
        # Enable gzip compression for static files
        gzip on;
        gzip_types text/css application/javascript text/javascript;
    }

    # IPX image processing - proxy to Node.js server
    location /_ipx/ {
        proxy_pass http://localhost:3003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Cache IPX processed images
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Robots.txt and sitemap handling
    location = /robots.txt {
        expires 1d;
        add_header Cache-Control "public";
        add_header Content-Type "text/plain";
        try_files $uri =404;
    }

    location = /sitemap.xml {
        expires 1d;
        add_header Cache-Control "public";
        add_header Content-Type "application/xml";
        try_files $uri =404;
    }

    # Block access to development and sensitive files
    location ~* /node_modules/ {
        deny all;
        access_log off;
        log_not_found off;
        return 404;
    }

    location ~* /\.(env|git|svn|hg|bzr|cvs) {
        deny all;
        access_log off;
        log_not_found off;
        return 404;
    }

    location ~* /(package\.json|package-lock\.json|yarn\.lock|composer\.json|composer\.lock) {
        deny all;
        access_log off;
        log_not_found off;
        return 404;
    }

    location ~* /(\.config|\.vscode|\.idea|\.DS_Store|Thumbs\.db) {
        deny all;
        access_log off;
        log_not_found off;
        return 404;
    }

    location ~* /(test|tests|spec|__tests__|coverage|\.nyc_output) {
        deny all;
        access_log off;
        log_not_found off;
        return 404;
    }

    # Security: Block access to sensitive files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Proxy to Node.js server (for SSR)
    location / {
        proxy_pass http://localhost:3003;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Add some timeouts for better stability
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ACME challenge
    location ^~ /.well-known/acme-challenge/ {
        allow all;
        default_type "text/plain";
    }

    # Error pages
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;

    listen [::]:443 ssl; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/ionicswap.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/ionicswap.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
    
    # Additional SSL security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
}

server {
    if ($host = www.ionicswap.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = ionicswap.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    listen [::]:80;
    server_name ionicswap.com www.ionicswap.com;
    return 404; # managed by Certbot
}
