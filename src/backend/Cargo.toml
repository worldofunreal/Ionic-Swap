[package]
name = "backend"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
bs58 = "0.5.1"
candid = "0.10.14"
getrandom = { version = "*", default-features = false, features = ["custom"] }
ic-cdk = "0.17.2"
ic-http-certification = "0.2.0"
serde = { version = "1.0.219", features = ["derive"] }
serde_json = "1.0"
sha3 = "0.10.1"
hex = "0.4.3"

[dev-dependencies]
candid_parser = "0.1.4"